# Local-only Antora playbook for previewing the operator docs component.
#
# This is NOT the official publishing playbook -- the operator is published as
# an additional component of the Apache Solr Reference Guide, whose playbook
# lives in the apache/solr repo (solr/solr-ref-guide). This file just lets a
# contributor render the operator component on its own to preview changes.
#
# Build with:  make docs
#
# `make docs` runs the antora/antora image with its working directory set to
# this folder (docs/), so both the current working directory and this
# playbook's directory are the same. Relative paths below are therefore
# resolved against docs/: `url: ..` is the repository git root (where .git
# lives) and the site is written to docs/build/site. Always build via
# `make docs` so the working directory is correct.
site:
  title: Apache Solr Operator (local preview)
  start_page: operator::index.adoc

content:
  sources:
    - url: ..
      # HEAD builds the current worktree, including uncommitted changes.
      branches: HEAD
      start_path: docs/build/staging
      # No "edit this page" links in local preview.
      edit_url: false

ui:
  # Reuse the published Solr Reference Guide UI bundle so the local preview
  # looks like the real site. Requires network access on first build.
  bundle:
    url: 'https://nightlies.apache.org/solr/solr-reference-guide-ui-bundle/ui-bundle.zip'
    snapshot: true

output:
  clean: true
  dir: ./build/site

runtime:
  fetch: true
